<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Тренажёр для подготовки к экзамену по биологии: чтение, карточки, тесты, поиск." />
  <meta name="theme-color" content="#2e7d4f" />
  <title>Биология · подготовка к экзамену</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Биология" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Шапка ─────────────────────────────────────────── -->
  <header class="topbar">
    <button class="icon-btn nav-toggle" id="navToggle" aria-label="Список билетов" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="topbar-title" id="topbarTitle">Биология</div>
    <button class="icon-btn settings-toggle" id="settingsToggle" aria-label="Настройки">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2.6l1.5 2.6 3-.4 .6 3 2.6 1.5-1.3 2.7 1.3 2.7-2.6 1.5-.6 3-3-.4L12 21.4 10.5 18.8l-3 .4-.6-3L4.3 14.7l1.3-2.7-1.3-2.7 2.6-1.5 .6-3 3 .4Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
    </button>
    <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Сменить тему">
      <svg class="i-sun" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><circle cx="12" cy="12" r="4.5" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></g></svg>
      <svg class="i-moon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z" fill="currentColor"/></svg>
    </button>
  </header>

  <!-- ── Drawer навигации ──────────────────────────────── -->
  <div class="drawer-scrim" id="drawerScrim" hidden></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div class="seg" role="tablist" aria-label="Вид списка">
        <button class="seg-btn is-active" id="navBySection" role="tab" aria-selected="true">По разделам</button>
        <button class="seg-btn" id="navByNumber" role="tab" aria-selected="false">По билетам</button>
      </div>
    </div>
    <nav class="drawer-list" id="drawerList" aria-label="Навигация по билетам"><!-- наполняется JS --></nav>
  </aside>

  <!-- ── Контент ───────────────────────────────────────── -->
  <main class="main" id="main">
    <section class="view" id="view-home" hidden></section>
    <section class="view" id="view-read" hidden></section>
    <section class="view" id="view-cards" hidden></section>
    <section class="view" id="view-quiz" hidden></section>
    <section class="view" id="view-search" hidden></section>
    <section class="view" id="view-gloss" hidden></section>

    <div class="loading" id="loading">
      <div class="spinner" aria-hidden="true"></div>
      <p>Загружаю конспект…</p>
    </div>
  </main>

  <!-- ── Нижний таб-бар / верхняя навигация ────────────── -->
  <nav class="tabbar" id="tabbar" aria-label="Режимы">
    <button class="tab" data-mode="home"   aria-label="Главная">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-7 9 7M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
      <span>Главная</span>
    </button>
    <button class="tab" data-mode="read"   aria-label="Чтение">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6c-2-1.3-4.5-1.8-7-1.5v13c2.5-.3 5 .2 7 1.5 2-1.3 4.5-1.8 7-1.5v-13c-2.5-.3-5 .2-7 1.5Zm0 0v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
      <span>Чтение</span>
    </button>
    <button class="tab" data-mode="gloss" aria-label="Глоссарий">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h11a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 8h6M9 11h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Глоссарий</span>
    </button>
    <button class="tab" data-mode="search" aria-label="Поиск">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M16 16l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Поиск</span>
    </button>
  </nav>

  <script src="vendor/marked.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
